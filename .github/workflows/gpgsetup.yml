# Verify and refresh the PPA signing key.
name: GPG setup

on:
  workflow_dispatch:
    inputs:
      extend_expiry:
        description: "Extend key expiry to never expire"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    # Weekly key health check.
    - cron: "0 2 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gpg-setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Setup GPG
        uses: diepxuan/.github/.github/actions/gpg-setup@main
        with:
          gpg_key: ${{ secrets.GPG_KEY }}
          gpg_key_id: ${{ secrets.GPG_KEY_ID }}
          committer_email: ${{ secrets.GIT_COMMITTER_EMAIL }}
          committer_name: ${{ github.repository_owner }}

      - name: Verify current GPG key
        shell: bash
        run: |
          set -euo pipefail
          gpg --list-secret-keys --keyid-format=long "$GPG_KEY_ID"
          gpg --list-keys --with-colons "$GPG_KEY_ID"
          gpg --export "$GPG_KEY_ID" > /tmp/key.gpg
          gpg --show-keys --with-fingerprint /tmp/key.gpg
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}

      - name: Extend GPG expiry
        if: github.event_name == 'workflow_dispatch' && inputs.extend_expiry == 'true'
        shell: bash
        run: |
          set -euo pipefail
          gpg --batch --command-fd 0 --edit-key "$GPG_KEY_ID" <<EOF
          key 1
          expire
          0
          save
          EOF

          gpg --batch --command-fd 0 --edit-key "$GPG_KEY_ID" <<EOF
          expire
          0
          save
          EOF

          gpg --batch --command-fd 0 --edit-key "$GPG_KEY_ID" <<EOF
          trust
          5
          save
          EOF

          gpg --export "$GPG_KEY_ID" > key.gpg
          mkdir -p keyrings
          gpg --export "$GPG_KEY_ID" > keyrings/diepxuan.gpg
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}

      - name: Verify exported key files
        if: github.event_name == 'workflow_dispatch' && inputs.extend_expiry == 'true'
        shell: bash
        run: |
          set -euo pipefail
          test -s key.gpg
          test -s keyrings/diepxuan.gpg
          gpg --show-keys --with-fingerprint key.gpg
          gpg --show-keys --with-fingerprint keyrings/diepxuan.gpg

      - name: Commit refreshed key to gh-pages
        if: github.event_name == 'workflow_dispatch' && inputs.extend_expiry == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "DiepXuan CI"
          git config user.email "${GIT_COMMITTER_EMAIL}"

          git add key.gpg keyrings/diepxuan.gpg
          if ! git diff --cached --quiet; then
            git commit -m "ci: refresh PPA signing key"
            git push origin gh-pages
          else
            echo "No key changes to publish"
          fi
        env:
          GIT_COMMITTER_EMAIL: ${{ secrets.GIT_COMMITTER_EMAIL }}
